# SDK 레포용 CI — chok-v2-py-sdk/.github/workflows/ci.yml 로 복사
# ⚠️ test 잡은 레포 실제 도구(uv/pip/poetry)에 맞게 조정하세요. 아래는 uv 가정.
# ⚠️ build 잡은 레포에 Dockerfile(python, 기본 실행 rca-collect)이 있어야 통과.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: uv 설치(+캐시)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: 의존성 설치
        run: uv sync --frozen
      - name: 테스트
        run: uv run pytest -v

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: KT-AX-ICT/chok-v2-deploy/.github/workflows/reusable-docker-build.yml@main
    with:
      image_name: chok-v2-py-sdk
      service_key: sdk
    secrets:
      DEPLOY_BOT_APP_ID: ${{ secrets.DEPLOY_BOT_APP_ID }}
      DEPLOY_BOT_PRIVATE_KEY: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
