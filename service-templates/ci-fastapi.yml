# FastAPI 레포용 CI — chok-v2-ai-backend/.github/workflows/ci.yml 로 복사
# ⚠️ 원격 레포에 이미 tests.yml이 있으면 테스트가 두 벌이 된다.
#    이 파일의 test 잡을 빼고 build 잡만 두거나, tests.yml을 이 파일로 흡수해 하나로 정리.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # 앱 임포트 시 Settings가 키를 요구할 수 있어 더미값 주입.
      # 테스트는 SQLite in-memory라 실제 OpenAI·MySQL 호출 없음.
      OPENAI_API_KEY: sk-test-dummy
    steps:
      - uses: actions/checkout@v4
      - name: uv 설치(+캐시)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: 의존성 설치(test extra 포함)
        run: uv sync --frozen --extra dev
      - name: 린트(ruff) — 프로젝트 dep 아님, uvx로 실행
        run: uvx ruff check .
      - name: 테스트(pytest)
        run: uv run pytest -v

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: KT-AX-ICT/chok-v2-deploy/.github/workflows/reusable-docker-build.yml@main
    with:
      image_name: chok-v2-ai-backend
      service_key: fastapi
    secrets:
      DEPLOY_BOT_APP_ID: ${{ secrets.DEPLOY_BOT_APP_ID }}
      DEPLOY_BOT_PRIVATE_KEY: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
