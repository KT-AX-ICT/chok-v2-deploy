# Frontend 레포용 CI — chok-v2-react-frontend/.github/workflows/ci.yml 로 복사
# ⚠️ build 잡은 레포에 컨테이너 포트 5173을 제공하는 Dockerfile이 있어야 통과.
#    아직 없으면 build 잡을 지우고 test 잡만 유지.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: 의존성 설치
        run: npm ci
      - name: 빌드 확인
        run: npm run build

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: KT-AX-ICT/chok-v2-deploy/.github/workflows/reusable-docker-build.yml@main
    with:
      image_name: chok-v2-react-frontend
      service_key: frontend
    secrets:
      DEPLOY_BOT_APP_ID: ${{ secrets.DEPLOY_BOT_APP_ID }}
      DEPLOY_BOT_PRIVATE_KEY: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
