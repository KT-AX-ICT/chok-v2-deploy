# Spring 레포용 CI — chok-v2-spring-backend/.github/workflows/ci.yml 로 복사
# ⚠️ build 잡은 레포에 Dockerfile(JDK21 빌드 → JRE 런타임)이 있어야 통과.
#    현재 chok-v2-spring-backend엔 Dockerfile이 없다 → 우선 build 잡을 지우고 test 잡만 두거나,
#    Dockerfile 추가 후 build를 붙인다.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: gradlew 실행권한
        run: chmod +x ./gradlew
      - name: 테스트
        run: ./gradlew test

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: KT-AX-ICT/chok-v2-deploy/.github/workflows/reusable-docker-build.yml@main
    with:
      image_name: chok-v2-spring-backend
      service_key: spring
    secrets:
      DEPLOY_BOT_APP_ID: ${{ secrets.DEPLOY_BOT_APP_ID }}
      DEPLOY_BOT_PRIVATE_KEY: ${{ secrets.DEPLOY_BOT_PRIVATE_KEY }}
