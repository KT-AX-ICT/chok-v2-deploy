name: chok-v2

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      SPRING_DB_NAME: ${SPRING_DB_NAME:-chokchok}
      SPRING_DB_USER: ${SPRING_DB_USER:-chokchok}
      SPRING_DB_PASSWORD: ${SPRING_DB_PASSWORD:?set SPRING_DB_PASSWORD in .env}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME:-chok_ai}
      FASTAPI_DB_USER: ${FASTAPI_DB_USER:-chok_ai}
      FASTAPI_DB_PASSWORD: ${FASTAPI_DB_PASSWORD:?set FASTAPI_DB_PASSWORD in .env}
      TZ: UTC
    command: --default-time-zone=+00:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init/01-create-databases.sh:/docker-entrypoint-initdb.d/01-create-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - chok-v2

  spring:
    # 서비스 CI가 생성하는 deploy PR이 이 digest만 갱신합니다.
    image: ghcr.io/kt-ax-ict/chok-v2-spring-backend@sha256:c6572378207400f86778cdd8ada039a481212352090d81e658d0f1a5a55bb319
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${SPRING_DB_NAME:-chokchok}
      DB_USER: ${SPRING_DB_USER:-chokchok}
      DB_PASSWORD: ${SPRING_DB_PASSWORD:?set SPRING_DB_PASSWORD in .env}
      APP_CORS_ORIGINS: ${FRONTEND_PUBLIC_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:?set INTERNAL_SHARED_SECRET in .env}
    ports:
      - "${SPRING_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chok-v2

  fastapi:
    # 서비스 CI가 생성하는 deploy PR이 이 digest만 갱신합니다.
    image: ghcr.io/kt-ax-ict/chok-v2-ai-backend@sha256:1451125abd7d1df02fcf6b702bce3bd8fdfca51b5300ba3e32acf16b70924c47
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: ${FASTAPI_DB_NAME:-chok_ai}
      MYSQL_USER: ${FASTAPI_DB_USER:-chok_ai}
      MYSQL_PASSWORD: ${FASTAPI_DB_PASSWORD:?set FASTAPI_DB_PASSWORD in .env}
      SPRING_BASE_URL: http://spring:8080
      RCA_WORKER_CONCURRENCY: ${RCA_WORKER_CONCURRENCY:-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      OPENAI_MODEL_REPORT: ${OPENAI_MODEL_REPORT:-gpt-5.5-2026-04-23}
      OPENAI_MODEL_ANALYSIS: ${OPENAI_MODEL_ANALYSIS:-gpt-5.4-mini-2026-03-17}
      OPENAI_MODEL_LIGHT: ${OPENAI_MODEL_LIGHT:-gpt-5.4-nano-2026-03-17}
      OPENAI_MAX_CONCURRENCY: ${OPENAI_MAX_CONCURRENCY:-4}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-3}
      OPENAI_MAX_INPUT_CHARS: ${OPENAI_MAX_INPUT_CHARS:-120000}
      BUNDLE_STORAGE_DIR: /app/data/bundles
    ports:
      - "${FASTAPI_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - fastapi-bundles:/app/data/bundles
    depends_on:
      mysql:
        condition: service_healthy
      spring:
        condition: service_started
    networks:
      - chok-v2

  frontend:
    # 서비스 CI가 생성하는 deploy PR이 이 digest만 갱신합니다.
    image: ghcr.io/kt-ax-ict/chok-v2-react-frontend@sha256:1867801a82f5dd4d955f3d0b3765ba10a247c030161ca7eb221cd6fbb64df723
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${SPRING_PUBLIC_URL:-http://localhost:8080}
      VITE_USE_MOCK: "false"
    ports:
      - "${FRONTEND_PUBLISHED_PORT:-5173}:5173"
    depends_on:
      spring:
        condition: service_started
    networks:
      - chok-v2

volumes:
  mysql-data:
  fastapi-bundles:

networks:
  chok-v2:
    driver: bridge
